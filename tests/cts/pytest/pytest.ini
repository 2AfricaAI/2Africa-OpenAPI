[pytest]
markers =
    l1: Conformance Level 1 (Basic - OAuth + Manifest + 1 upstream)
    l2: Conformance Level 2 (Full - all 10 endpoints + signed webhooks)
    l3: Conformance Level 3 (Advanced - E2E encryption + federated identity)
    needs_oauth: requires a real OAuth flow to be configured
    needs_webhook: requires a webhook delivery to be configurable
addopts = --tb=short --strict-markers
