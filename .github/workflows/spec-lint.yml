name: Spec Lint

on:
  push:
    branches: [main]
    paths:
      - 'spec/**'
      - '.spectral.yml'
      - '.github/workflows/spec-lint.yml'
  pull_request:
    paths:
      - 'spec/**'
      - '.spectral.yml'
      - '.github/workflows/spec-lint.yml'

jobs:
  spectral:
    name: Spectral lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Spectral
        run: npm install -g @stoplight/spectral-cli@^6.11

      - name: Lint OpenAPI 3.1 spec
        run: spectral lint --ruleset .spectral.yml spec/openapi.yaml

      - name: Lint AsyncAPI 2.6 spec
        run: spectral lint --ruleset .spectral.yml spec/webhooks.asyncapi.yaml

      - name: Sanity-parse Privacy Manifest schema as YAML
        run: |
          python3 -c "import yaml; d=yaml.safe_load(open('spec/privacy-manifest.schema.yaml')); assert d.get('\$schema','').endswith('draft/2020-12/schema'), d; print('Privacy Manifest schema parses; full validation in Sprint 1.')"
