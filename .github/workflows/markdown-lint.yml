name: Markdown Lint

on:
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - '.markdownlint.json'
      - '.github/workflows/markdown-lint.yml'
  pull_request:
    paths:
      - '**/*.md'
      - '.markdownlint.json'
      - '.github/workflows/markdown-lint.yml'

jobs:
  markdownlint:
    name: markdownlint-cli
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli@^0.41

      - name: Lint Markdown
        run: |
          markdownlint \
            --config .markdownlint.json \
            "**/*.md" \
            --ignore node_modules \
            --ignore sdks/*/node_modules
