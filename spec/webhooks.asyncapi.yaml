#
# 2Africa OpenAPI - Webhook events (AgriCloud -> AgriOS)
# Skeleton placeholder. Full event catalogue lands in Sprint 1.

asyncapi: 2.6.0

info:
  title: 2Africa OpenAPI Webhooks
  version: 0.1.0-skeleton
  description: |
    AgriCloud (or any conformant server) signs and POSTs event
    payloads to subscribed AgriOS clients. Signature header
    X-AgriCloud-Signature t=UNIX,v1=HEX uses HMAC-SHA256 over t.body.
    Anti-replay window 5 minutes. Retry schedule: 1m, 5m, 30m, 2h, 6h.
    Full event set lands in Sprint 1 (price.updated and friends).
  contact:
    name: 2Africa OpenAPI Maintainers
    url: https://github.com/2AfricaAI/2Africa-OpenAPI
    email: openapi@2africa.ai
  license:
    name: CC BY 4.0
    url: https://creativecommons.org/licenses/by/4.0/

servers:
  production:
    url: api.agricloud.2africa.ai
    protocol: https
    description: Reference production server (AgriCloud).
  sandbox:
    url: sandbox.agricloud.2africa.ai
    protocol: https
    description: Reference sandbox (free, 7-day token renewal).

defaultContentType: application/json

tags:
  - name: System
    description: Operational events used during conformance testing.

channels:

  system.healthcheck:
    description: |
      Test event used to validate signature verification end-to-end
      during conformance testing. Real events arrive in Sprint 1.
    subscribe:
      operationId: receiveHealthcheck
      summary: Receive a health-check webhook.
      description: |
        Conformant receivers MUST verify the HMAC-SHA256 signature
        in X-AgriCloud-Signature against the raw request body before
        processing. Receivers MUST treat event_id as an idempotency
        key.
      tags:
        - name: System
      message:
        $ref: '#/components/messages/HealthcheckEvent'

components:

  messages:

    HealthcheckEvent:
      name: HealthcheckEvent
      title: Webhook health-check
      summary: No-op event used to verify webhook delivery.
      contentType: application/json
      payload:
        type: object
        additionalProperties: false
        required:
          - event_id
          - event_type
          - created_at
        properties:
          event_id:
            type: string
            format: uuid
            description: Idempotency key; receivers must dedupe.
          event_type:
            type: string
            const: system.healthcheck
          created_at:
            type: string
            format: date-time
            description: ISO 8601 UTC timestamp.
      headers:
        type: object
        required:
          - X-AgriCloud-Signature
          - X-AgriCloud-Spec-Version
        properties:
          X-AgriCloud-Signature:
            type: string
            pattern: '^t=\d+,v1=[0-9a-f]{64}$'
          X-AgriCloud-Spec-Version:
            type: string
            pattern: '^\d+\.\d+\.\d+(-[A-Za-z0-9\-\.]+)?$'
