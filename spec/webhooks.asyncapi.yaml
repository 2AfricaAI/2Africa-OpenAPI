#
# 2Africa OpenAPI - Webhook events (server -> single-farm client)
# v1.0.0-rc1

asyncapi: 2.6.0

info:
  title: 2Africa OpenAPI Webhooks
  version: 1.0.0-rc1
  description: |
    The platform signs and POSTs event payloads to subscribed
    single-farm clients. Every delivery carries the signature header:

      X-AgriCloud-Signature: t=<unix_timestamp>,v1=<hex_hmac_sha256>

    The HMAC is computed over the byte sequence `t.body`, where `t`
    is the unix timestamp also present in the header and `body` is
    the raw request body. The signing key is the client's webhook
    secret obtained at subscription time.

    Receivers MUST:
      - reject deliveries whose timestamp differs from now by more
        than 5 minutes (replay window).
      - dedupe on event_id (idempotency).
      - return any 2xx status to acknowledge.

    Failed deliveries (non-2xx, timeout >30s, or connection error)
    are retried by the server with exponential backoff:
      1 min, 5 min, 30 min, 2 h, 6 h (5 attempts, 24h window).

    If the receiver missed events while offline, it MAY call
    `GET /v1/events?since=<timestamp>` to backfill (Sprint 2 endpoint;
    not in v1.0).
  contact:
    name: 2Africa OpenAPI Maintainers
    url: https://github.com/2AfricaAI/2Africa-OpenAPI
    email: openapi@2africa.ai
  license:
    name: CC BY 4.0
    url: https://creativecommons.org/licenses/by/4.0/

servers:
  production:
    url: api.agricloud.2africa.ai
    protocol: https
    description: Reference production server (AgriCloud).
  sandbox:
    url: sandbox.agricloud.2africa.ai
    protocol: https
    description: Reference sandbox (free, 7-day token renewal).

defaultContentType: application/json

tags:
  - name: System
    description: Operational events used during conformance testing.
  - name: Pricing
    description: Regional pricing and peer-benchmark updates.
  - name: Marketplace
    description: Buyer-posted order events.
  - name: Procurement
    description: Group-buy opportunity events.
  - name: Telemetry
    description: Server-driven telemetry configuration changes.

channels:

  # ------------------------------------------------------------------
  # System
  # ------------------------------------------------------------------
  system.healthcheck:
    description: |
      Test event used to validate signature verification end-to-end
      during conformance testing.
    subscribe:
      operationId: receiveSystemHealthcheck
      summary: Receive a health-check webhook.
      description: |
        Conformant receivers MUST verify the HMAC-SHA256 signature in
        X-AgriCloud-Signature against the raw request body before
        processing. Receivers MUST treat event_id as an idempotency
        key.
      tags:
        - name: System
      message:
        $ref: '#/components/messages/HealthcheckEvent'

  # ------------------------------------------------------------------
  # Pricing
  # ------------------------------------------------------------------
  pricing.price-updated:
    description: |
      Emitted when the regional-price benchmark for a (region,sku)
      pair refreshes. Clients may use this to invalidate their
      dashboard cache.
    subscribe:
      operationId: receivePriceUpdated
      summary: Regional price benchmark refreshed.
      description: |
        Receivers MAY immediately re-call GET /v1/downstream/prices to
        pull the updated row. The event itself does not carry full
        figures (privacy: it is sent to many clients) - only enough to
        identify the affected (region,sku).
      tags:
        - name: Pricing
      message:
        $ref: '#/components/messages/PriceUpdatedEvent'

  pricing.benchmark-refreshed:
    description: |
      Emitted when the peer benchmark for a (region,crop,size_band)
      tuple refreshes (typically nightly).
    subscribe:
      operationId: receiveBenchmarkRefreshed
      summary: Peer benchmark refreshed.
      description: |
        Sent at most once per (region,crop,size_band) tuple per 24h
        window.
      tags:
        - name: Pricing
      message:
        $ref: '#/components/messages/BenchmarkRefreshedEvent'

  # ------------------------------------------------------------------
  # Marketplace
  # ------------------------------------------------------------------
  marketplace.order-posted:
    description: |
      A new sourcing order matching the receiver's declared region and
      crop capabilities has been posted by a buyer.
    subscribe:
      operationId: receiveMarketplaceOrderPosted
      summary: Sourcing order posted.
      description: |
        Receivers may respond to the buyer through out-of-band channels
        (v1.0 does not define an in-protocol response endpoint).
      tags:
        - name: Marketplace
      message:
        $ref: '#/components/messages/MarketplaceOrderPostedEvent'

  # ------------------------------------------------------------------
  # Procurement
  # ------------------------------------------------------------------
  procurement.opportunity-opened:
    description: |
      A new group-buy opportunity matching the receiver's region is
      open for commitment.
    subscribe:
      operationId: receiveProcurementOpportunityOpened
      summary: Group-buy opportunity opened.
      description: |
        Emitted at most once per opportunity_id. Receivers MAY commit
        to the opportunity through out-of-band channels.
      tags:
        - name: Procurement
      message:
        $ref: '#/components/messages/ProcurementOpportunityOpenedEvent'

  # ------------------------------------------------------------------
  # Telemetry
  # ------------------------------------------------------------------
  telemetry.config-changed:
    description: |
      Server-side telemetry configuration (sample rate, event
      whitelist) has changed. The client SDK SHOULD adjust outgoing
      telemetry accordingly.
    subscribe:
      operationId: receiveTelemetryConfigChanged
      summary: Server telemetry configuration changed.
      description: |
        The client SDK SHOULD apply the new sample_rate and
        event_whitelist before sending the next telemetry batch.
      tags:
        - name: Telemetry
      message:
        $ref: '#/components/messages/TelemetryConfigChangedEvent'

# ====================================================================
# Components
# ====================================================================
components:

  # ------------------------------------------------------------------
  # Shared headers (every event carries these)
  # ------------------------------------------------------------------
  schemas:

    EventHeaders:
      type: object
      additionalProperties: false
      required:
        - X-AgriCloud-Signature
        - X-AgriCloud-Spec-Version
        - X-AgriCloud-Delivery-Id
        - X-AgriCloud-Event-Type
      properties:
        X-AgriCloud-Signature:
          type: string
          pattern: '^t=\d+,v1=[0-9a-f]{64}$'
          description: 't=<unix>,v1=<hex HMAC-SHA256(t.body, secret)>'
        X-AgriCloud-Spec-Version:
          type: string
          pattern: '^\d+\.\d+\.\d+(-[A-Za-z0-9\-\.]+)?$'
          description: Spec version the sending server implements.
        X-AgriCloud-Delivery-Id:
          type: string
          format: uuid
          description: |
            Server-generated identifier unique per delivery attempt
            (different from event_id, which is unique per event).
        X-AgriCloud-Event-Type:
          type: string
          pattern: '^[a-z][a-z0-9_]*\.[a-z][a-z0-9_]*$'
          description: |
            Mirrors the event_type in the body, present in the header
            so receivers can route without parsing JSON.

    BaseEventPayload:
      type: object
      required:
        - event_id
        - event_type
        - created_at
      properties:
        event_id:
          type: string
          format: uuid
          description: Idempotency key; receivers MUST dedupe.
        event_type:
          type: string
          pattern: '^[a-z][a-z0-9_]*\.[a-z][a-z0-9_]*$'
        created_at:
          type: string
          format: date-time
          description: ISO 8601 UTC when the server created the event.

    RegionCode:
      type: string
      pattern: '^[A-Z]{2}-[A-Z0-9]{1,3}$'
      examples: [KE-30]

    SkuCode:
      type: string
      pattern: '^[A-Z][A-Z0-9_]{1,31}$'

  # ------------------------------------------------------------------
  # Messages (one per event type)
  # ------------------------------------------------------------------
  messages:

    HealthcheckEvent:
      name: HealthcheckEvent
      title: Webhook health-check
      summary: No-op event used to verify webhook delivery.
      contentType: application/json
      headers: { $ref: '#/components/schemas/EventHeaders' }
      payload:
        allOf:
          - $ref: '#/components/schemas/BaseEventPayload'
          - type: object
            properties:
              event_type:
                const: system.healthcheck

    PriceUpdatedEvent:
      name: PriceUpdatedEvent
      title: Regional price refreshed
      summary: Identifies which (region, sku) row has a fresh value.
      contentType: application/json
      headers: { $ref: '#/components/schemas/EventHeaders' }
      payload:
        allOf:
          - $ref: '#/components/schemas/BaseEventPayload'
          - type: object
            required: [region_code, sku_code, window]
            properties:
              event_type:
                const: pricing.price_updated
              region_code: { $ref: '#/components/schemas/RegionCode' }
              sku_code:    { $ref: '#/components/schemas/SkuCode' }
              window:
                type: string
                enum: [7d, 30d, 90d]
              sample_size:
                type: integer
                minimum: 30
                description: Receivers SHOULD ignore the event if sample_size < 30.

    BenchmarkRefreshedEvent:
      name: BenchmarkRefreshedEvent
      title: Peer benchmark refreshed
      summary: Identifies which (region, crop, size_band) tuple has a fresh benchmark.
      contentType: application/json
      headers: { $ref: '#/components/schemas/EventHeaders' }
      payload:
        allOf:
          - $ref: '#/components/schemas/BaseEventPayload'
          - type: object
            required: [region_code, crop_code]
            properties:
              event_type:
                const: pricing.benchmark_refreshed
              region_code: { $ref: '#/components/schemas/RegionCode' }
              crop_code:   { $ref: '#/components/schemas/SkuCode' }
              size_band:
                type: string
                enum: [smallholder, medium, large]
              window:
                type: string
                enum: [30d, 90d, 365d]

    MarketplaceOrderPostedEvent:
      name: MarketplaceOrderPostedEvent
      title: Sourcing order posted
      summary: A new buyer order matches the receiver's profile.
      contentType: application/json
      headers: { $ref: '#/components/schemas/EventHeaders' }
      payload:
        allOf:
          - $ref: '#/components/schemas/BaseEventPayload'
          - type: object
            required: [order_id, region_code, sku_code, expires_at]
            properties:
              event_type:
                const: marketplace.order_posted
              order_id:    { type: string, format: uuid }
              region_code: { $ref: '#/components/schemas/RegionCode' }
              sku_code:    { $ref: '#/components/schemas/SkuCode' }
              expires_at:  { type: string, format: date-time }

    ProcurementOpportunityOpenedEvent:
      name: ProcurementOpportunityOpenedEvent
      title: Group-buy opportunity opened
      summary: A new procurement opportunity matches the receiver's region.
      contentType: application/json
      headers: { $ref: '#/components/schemas/EventHeaders' }
      payload:
        allOf:
          - $ref: '#/components/schemas/BaseEventPayload'
          - type: object
            required: [opportunity_id, category, region_code, expires_at]
            properties:
              event_type:
                const: procurement.opportunity_opened
              opportunity_id: { type: string, format: uuid }
              category:
                type: string
                enum: [seed, fertiliser, pesticide, equipment, packaging, other]
              region_code: { $ref: '#/components/schemas/RegionCode' }
              expires_at:  { type: string, format: date-time }

    TelemetryConfigChangedEvent:
      name: TelemetryConfigChangedEvent
      title: Telemetry configuration changed
      summary: Server-side telemetry config has been updated.
      contentType: application/json
      headers: { $ref: '#/components/schemas/EventHeaders' }
      payload:
        allOf:
          - $ref: '#/components/schemas/BaseEventPayload'
          - type: object
            required: [config_version, sample_rate]
            properties:
              event_type:
                const: telemetry.config_changed
              config_version: { type: integer, minimum: 1 }
              sample_rate:
                type: number
                minimum: 0
                maximum: 1
                description: 0.0 disables; 1.0 sends everything; values in between subsample.
              event_whitelist:
                type: array
                items:
                  type: string
                  pattern: '^[a-z][a-z0-9_]*\.[a-z][a-z0-9_]*$'
                description: |
                  If present, only events whose name matches an entry
                  are sent to /v1/upstream/telemetry. Empty array means
                  send nothing; absent key means send everything.
