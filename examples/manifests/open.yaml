# Privacy Manifest - OPEN preset
# All upstream endpoints ON. Use only when the tenant explicitly
# wants maximum network value (e.g. participation in credit and
# group-buy programmes). Credit-pack recipients still allow-listed.

manifest_version: 1.0.0
profile: open
generated_at: '2026-05-29T14:30:00Z'
owner_id: jane.doe@example-farm.ke
notes: |
  Open posture. Yields, prices, GAP, telemetry continuously on;
  credit-pack one-shot to two pre-approved banks.

endpoints:
