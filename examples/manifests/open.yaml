    enabled: true
    region_floor: subdivision
    retention_days: 730
    rate_limit_per_hour: 200

  prices:
    enabled: true
    region_floor: subdivision
    retention_days: 730
    rate_limit_per_hour: 200

  gap_records:
    enabled: true
    region_floor: subdivision
    retention_days: 1825
